services:
  - type: web
    name: invoiceflow-demo
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: AUTH_DISABLED
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        value: "defaultdb"
